name: Build

on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - 'NOTICE'
      - '.gitignore'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  android:
    name: Android APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-app

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: rc-bridge-android-apk
          path: android-app/app/build/outputs/apk/debug/app-debug.apk

  pc-vigem:
    name: PC Receiver (ViGEmBus)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install vgamepad pyinstaller

      - name: Build EXE
        working-directory: pc-receiver-vigem
        run: |
          pyinstaller --onefile --name "rc-bridge-vigem" --collect-all vgamepad --console rc_bridge_vigem.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: rc-bridge-vigem-exe
          path: pc-receiver-vigem/dist/rc-bridge-vigem.exe
